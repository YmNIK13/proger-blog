services:
    nginx:
        image: nginx:alpine
        container_name: wp_nginx
        restart: unless-stopped
        ports:
            - "10301:80"
        volumes:
            - .:/app
            - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - wp_php

    wp_php:
        build:
            context: .
            target: development
#        image: leadsdoit/lara-php:8.4-dev
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        container_name: wp_php
        restart: unless-stopped
        environment:
            PHP_IDE_CONFIG: "serverName=docker_blog_php"
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
            CONTAINER_ROLE: "app"
            XDEBUG_MODE: "off"
        volumes:
            - .:/app
        depends_on:
            - db

    db:
        image: mysql:8.4.8
        container_name: wp_db
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: ${DB_NAME}
            MYSQL_USER: ${DB_USER}
            MYSQL_PASSWORD: ${DB_PASSWORD}
            MYSQL_ROOT_PASSWORD: root
        ports:
            - "11301:3306"
        volumes:
            - ".db/data:/var/lib/mysql"
            - ".db/dump:/dump"



