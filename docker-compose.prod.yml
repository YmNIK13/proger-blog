name: blog_wp

services:
    nginx:
        build:
            context: .
            target: nginx-production
        restart: unless-stopped
        ports:
            - "127.0.0.1:10301:80"
        volumes:
            - ./web/app/uploads:/app/web/app/uploads
        depends_on:
            wp_php:
                condition: service_started

    wp_php:
        build:
            context: .
            target: production
        restart: unless-stopped
        env_file:
            - .env
        volumes:
            - ./web/app/uploads:/app/web/app/uploads
        depends_on:
            db:
                condition: service_healthy

    db:
        image: mysql:8.4.8
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: ${DB_NAME:?DB_NAME is required}
            MYSQL_USER: ${DB_USER:?DB_USER is required}
            MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
        ports:
            - "127.0.0.1:11301:3306"
        volumes:
            - ./.db/data:/var/lib/mysql
            - ./.db/dump:/dump
        healthcheck:
            test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u\"$$MYSQL_USER\" -p\"$$MYSQL_PASSWORD\" --silent"]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 20s
